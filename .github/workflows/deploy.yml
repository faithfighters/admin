name: Build and Deploy Backend

on:
  push:
    branches:
      - main
      - stage
  workflow_dispatch:

env:
  DOCKER_IMAGE: kchauhan023/faithfighters-admin
  APP_PORT_PROD: 4000
  APP_PORT_STAGE: 4001
  CONTAINER_NAME_PROD: faithfighters-admin
  CONTAINER_NAME_STAGE: faithfighters-admin-stage

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Generate tags and environment variables
      id: vars
      run: |
        set -e
        SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        BRANCH_NAME=${GITHUB_REF#refs/heads/}
        VERSION_TAG="${BRANCH_NAME}-${SHORT_SHA}"

        echo "📦 Branch detected: $BRANCH_NAME"

        if [ "$BRANCH_NAME" = "main" ]; then
          CONTAINER_NAME="${{ env.CONTAINER_NAME_PROD }}"
          APP_PORT="${{ env.APP_PORT_PROD }}"
          IMAGE_TAG="latest"
        elif [ "$BRANCH_NAME" = "stage" ]; then
          CONTAINER_NAME="${{ env.CONTAINER_NAME_STAGE }}"
          APP_PORT="${{ env.APP_PORT_STAGE }}"
          IMAGE_TAG="stage"
        else
          echo "❌ Unsupported branch: $BRANCH_NAME"
          exit 1
        fi

        echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
        echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
        echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
        echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV
        echo "CONTAINER_NAME=$CONTAINER_NAME" >> $GITHUB_ENV
        echo "APP_PORT=$APP_PORT" >> $GITHUB_ENV
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

        echo "🏷️ Tag: ${IMAGE_TAG} | Version: ${VERSION_TAG}"
        echo "🚀 Deploying: $BRANCH_NAME | Container: $CONTAINER_NAME | Port: $APP_PORT"

    - name: Create env file
      run: |
        if [ "${{ env.BRANCH_NAME }}" = "stage" ]; then
          echo "${{ secrets.ENV_STAGE }}" > .env.stage
        else
          echo "${{ secrets.ENV_PROD }}" > .env.production
        fi

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        build-args: |
          ENV=${{ env.BRANCH_NAME }}
        push: true
        tags: |
          ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          ${{ env.DOCKER_IMAGE }}:${{ env.VERSION_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # Deploy to Production
    - name: Deploy to Production server
      if: env.BRANCH_NAME == 'main'
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          echo "✅ Connected to $(hostname)"
          cd /root/faithfighters-admin

          DEPLOY_TIME=$(date +'%Y-%m-%d %H:%M:%S')
          echo "📦 Deploying: ${{ env.CONTAINER_NAME }} on port ${{ env.APP_PORT }}"

          cat > docker-compose.yml << EOF
          version: '3.8'
          services:
            ${{ env.CONTAINER_NAME }}:
              image: ${{ env.DOCKER_IMAGE }}:latest
              container_name: ${{ env.CONTAINER_NAME }}
              restart: unless-stopped
              environment:
                - NODE_ENV=production
                - PORT=${{ env.APP_PORT }}
                - APP_VERSION=${{ env.VERSION_TAG }}
                - DEPLOY_TIME=$DEPLOY_TIME
              volumes:
                - ./logs:/app/logs
              network_mode: host
          EOF

          mkdir -p logs
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker pull ${{ env.DOCKER_IMAGE }}:latest
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true
          docker compose up -d

          sleep 15
          echo "🏥 Health checks..."
          for i in {1..5}; do
            if curl -f http://localhost:${{ env.APP_PORT }}/health 2>/dev/null || curl -f http://localhost:${{ env.APP_PORT }} 2>/dev/null; then
              echo "✅ Health check passed"
              break
            else
              echo "⏳ Retry $i/5"
              sleep 5
            fi
          done

          docker ps --filter "name=${{ env.CONTAINER_NAME }}"
          docker logs --tail=15 ${{ env.CONTAINER_NAME }}
          echo "🎉 Production deployment complete!"

    # Deploy to Staging
    - name: Deploy to Staging server
      if: env.BRANCH_NAME == 'stage'
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.STAGING_SERVER_HOST }}
        username: ${{ secrets.STAGING_SERVER_USER }}
        password: ${{ secrets.STAGING_SERVER_PASSWORD }}
        script: |
          echo "✅ Connected to $(hostname)"
          cd /root/faithfighters-admin

          DEPLOY_TIME=$(date +'%Y-%m-%d %H:%M:%S')
          echo "📦 Deploying: ${{ env.CONTAINER_NAME }} on port ${{ env.APP_PORT }}"

          cat > docker-compose.yml << EOF
          version: '3.8'
          services:
            ${{ env.CONTAINER_NAME }}:
              image: ${{ env.DOCKER_IMAGE }}:stage
              container_name: ${{ env.CONTAINER_NAME }}
              restart: unless-stopped
              environment:
                - NODE_ENV=staging
                - PORT=${{ env.APP_PORT }}
                - APP_VERSION=${{ env.VERSION_TAG }}
                - DEPLOY_TIME=$DEPLOY_TIME
              volumes:
                - ./logs:/app/logs
              network_mode: host
          EOF

          mkdir -p logs
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker pull ${{ env.DOCKER_IMAGE }}:stage
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true
          docker compose up -d

          sleep 15
          echo "🏥 Health checks..."
          for i in {1..5}; do
            if curl -f http://localhost:${{ env.APP_PORT }}/health 2>/dev/null || curl -f http://localhost:${{ env.APP_PORT }} 2>/dev/null; then
              echo "✅ Health check passed"
              break
            else
              echo "⏳ Retry $i/5"
              sleep 5
            fi
          done

          docker ps --filter "name=${{ env.CONTAINER_NAME }}"
          docker logs --tail=15 ${{ env.CONTAINER_NAME }}
          echo "🎉 Staging deployment complete!"
